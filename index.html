<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUPR 賽事報名</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .form-group { margin-bottom: 15px; }
    input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #06C755; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    #loadingMessage, #closedMessage { text-align: center; margin-top: 50px; font-size: 18px; }
    #closedMessage { color: red; font-weight: bold; }
  </style>
</head>
<body>

  <div id="loadingMessage">系統連線中，請稍候...</div>
  <div id="closedMessage" style="display: none;">⚠️ 目前非賽事報名時段</div>

  <div id="formContainer" style="display: none;">
    <h2>🎾 DUPR 賽事報名表</h2>
    <form id="duprForm">
      <div class="form-group">
        <label>真實姓名：</label>
        <input type="text" id="realName" required>
      </div>
      <div class="form-group">
        <label>DUPR ID：</label>
        <input type="text" id="duprId" required>
      </div>
      <div class="form-group">
        <label>報名組別：</label>
        <select id="group" required>
          <option value="男雙3.0+">男雙3.0+</option>
          <option value="混雙3.0+">混雙3.0+</option>
          </select>
      </div>
      <div class="form-group">
        <label>代訂便當：</label>
        <select id="bentoType">
          <option value="無">不需要</option>
          <option value="葷食">葷食 (1個)</option>
          <option value="素食">素食 (1個)</option>
        </select>
      </div>
      <button type="submit" id="submitBtn">送出報名</button>
    </form>
  </div>

  <script>
    // ⚠️ 這裡請換成你自己的資訊！
    const LIFF_ID = "2009559432-txA3hu8f"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycby7KXyG-OT1WJbS9YlR3l0iloHXBTSBbnkFnyLu9ukNkqvikPBAF-GHOtAy_7AYIjcpjg/exec"; 

    let userProfile = { displayName: "未提供", userId: "未提供" };

    // 網頁一載入，馬上執行
    window.onload = async function() {
      try {
        // 步驟 A：檢查系統是否開放報名
        const response = await fetch(GAS_URL);
        const data = await response.json();
        
        document.getElementById('loadingMessage').style.display = 'none';

        if (data.isOpen) {
          // 如果開放，顯示表單並初始化 LIFF
          document.getElementById('formContainer').style.display = 'block';
          await initLiff();
        } else {
          // 如果關閉，顯示未開放訊息
          document.getElementById('closedMessage').style.display = 'block';
        }
      } catch (error) {
        console.error("狀態檢查失敗", error);
        document.getElementById('loadingMessage').innerText = "系統連線失敗，請重新整理。";
      }
    };

    // 初始化 LIFF 並取得使用者資訊
    async function initLiff() {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        userProfile = await liff.getProfile();
      } else {
        liff.login(); // 沒登入的話要求登入
      }
    }

    // 表單送出事件
    document.getElementById('duprForm').addEventListener('submit', async function(e) {
      e.preventDefault(); // 阻止預設的表單重整
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.innerText = "報名送出中...";
      submitBtn.disabled = true;

      // 整理要送給後端的資料
      const bentoValue = document.getElementById('bentoType').value;
      const formData = {
        action: "register",
        realName: document.getElementById('realName').value,
        dupr: document.getElementById('duprId').value,
        group: document.getElementById('group').value,
        bentoQty: bentoValue === "無" ? 0 : 1,
        bentoType: bentoValue,
        lineDisplayName: userProfile.displayName,
        lineUserId: userProfile.userId
      };

      try {
        // 發送 POST 請求到你的 GAS 後端
        const postResponse = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify(formData)
        });
        const result = await postResponse.json();

        if (result.status === "success") {
          // 報名成功，系統已經透過 GAS 傳 LINE 訊息了，直接關閉視窗即可
          // (GAS 後端已有 sendLineMessage 邏輯，前端這裡就不再發送，避免重複)
          alert(`報名成功！您的狀態為：${result.registrationStatus}${result.registrationRank}\n請至 LINE 聊天室查看確認訊息。`);
          liff.closeWindow(); 
        } else {
          alert("報名失敗：" + result.message);
          submitBtn.innerText = "重新送出";
          submitBtn.disabled = false;
        }
      } catch (error) {
        alert("網路錯誤，請稍後再試！");
        submitBtn.innerText = "重新送出";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
